{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "service-chart.fullname" . }}
  labels:
    {{- include "service-chart.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "service-chart.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # N'autorise le trafic entrant que depuis les sources déclarées
    # (par défaut : tous les pods du même namespace + l'Ingress controller).
    - from:
        {{- toYaml .Values.networkPolicy.ingressFrom | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ .Values.containerPort }}
  egress:
    # Autorise la résolution DNS (kube-dns).
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Autorise les appels vers les destinations explicitement listées.
    {{- with .Values.networkPolicy.egressTo }}
    - to:
        {{- toYaml . | nindent 8 }}
    {{- end }}
{{- end }}
